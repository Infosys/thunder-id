server:
  hostname: "localhost"
  port: 8095

tls:
  cert_file: "repository/resources/security/server.cert"
  key_file: "repository/resources/security/server.key"

database:
  config:
    type: "postgres"
    hostname: "localhost"
    port: 5432
    name: "thunder_config"
    username: "postgres"
    password: "postgres"
    sslmode: "disable"

  runtime:
    type: "postgres"
    hostname: "localhost"
    port: 5432
    name: "thunder_runtime"
    username: "postgres"
    password: "postgres"
    sslmode: "disable"

  user:
    type: "postgres"
    hostname: "localhost"
    port: 5432
    name: "thunder_user"
    username: "postgres"
    password: "postgres"
    sslmode: "disable"
    
flow:
  max_version_history: 3

passkey:
  allowed_origins:
    - "https://localhost:8095"
    - "http://localhost:8095"

consent:
  enabled: false
